<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>RentFlow — Accept Invitation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F7F7F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      width: 64px; height: 64px;
      background: #635BFF;
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 32px; height: 32px; fill: white; }
    h1 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p  { font-size: 15px; color: #6B7280; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: block;
      background: #635BFF;
      color: white;
      text-decoration: none;
      border-radius: 99px;
      padding: 15px 24px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn.secondary {
      background: transparent;
      border: 1.5px solid #635BFF;
      color: #635BFF;
    }
    .store-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .store-btn {
      flex: 1;
      display: block;
      background: #111827;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
    }
    .store-btn span { display: block; font-size: 10px; opacity: 0.7; margin-bottom: 1px; }
    .divider { border: none; border-top: 1px solid #E5E7EB; margin: 24px 0; }
    .status { font-size: 13px; color: #9CA3AF; margin-top: 16px; }
    #status-msg { color: #635BFF; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </div>
    <h1>You've been invited!</h1>
    <p>Your landlord has invited you to join the RentFlow tenant portal. View your lease, payments, and send maintenance requests.</p>

    <a href="#" id="open-app" class="btn">Open in RentFlow App</a>

    <hr class="divider">

    <p style="margin-bottom:16px">Don't have the app yet? Download it free:</p>
    <div class="store-row">
      <a href="https://apps.apple.com/app/rentflow/id0000000000" class="store-btn" id="ios-btn">
        <span>Download on the</span>App Store
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.tabserve.rent_flow" class="store-btn" id="android-btn">
        <span>Get it on</span>Google Play
      </a>
    </div>

    <p class="status" id="status-msg"></p>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const token   = params.get('token');
    const deepLink = token ? ('rentflow://auth/invite/' + token) : null;

    const isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isAndroid = /Android/.test(navigator.userAgent);

    // Hide the irrelevant store button for known platforms
    if (isIOS)     document.getElementById('android-btn').style.display = 'none';
    if (isAndroid) document.getElementById('ios-btn').style.display     = 'none';

    const openBtn = document.getElementById('open-app');
    const statusMsg = document.getElementById('status-msg');

    if (!token) {
      openBtn.textContent = 'Invalid invitation link';
      openBtn.style.background = '#EF4444';
      openBtn.href = '#';
    } else {
      openBtn.href = deepLink;

      openBtn.addEventListener('click', function(e) {
        e.preventDefault();
        statusMsg.textContent = 'Opening RentFlow…';

        // Attempt to open the app via custom scheme
        window.location.href = deepLink;

        // After 2.5 s, if still here, redirect to the appropriate store
        setTimeout(() => {
          statusMsg.textContent = 'App not detected — redirecting to store…';
          if (isIOS) {
            window.location.href = 'https://apps.apple.com/app/rentflow/id0000000000';
          } else {
            window.location.href = 'https://play.google.com/store/apps/details?id=com.tabserve.rent_flow';
          }
        }, 2500);
      });
    }
  </script>
</body>
</html>
